<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love4CreditCard - Đang tải...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #7cb342 0%, #aed581 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: white;
        }
        .loader {
            text-align: center;
        }
        .logo {
            font-size: 64px;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .loading-text {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .loading-subtext {
            font-size: 14px;
            opacity: 0.9;
        }
        .manual-links {
            display: none;
            margin-top: 40px;
            gap: 15px;
        }
        .manual-links.show {
            display: flex;
            flex-direction: column;
        }
        .btn {
            padding: 15px 30px;
            background: white;
            color: #7cb342;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="logo">💳</div>
        <div class="loading-text">Love4CreditCard</div>
        <div class="loading-subtext">Đang tải phiên bản phù hợp...</div>
        
        <div class="manual-links" id="manualLinks">
            <a href="desktop.html" class="btn">💻 Phiên bản Desktop</a>
            <a href="ios.html" class="btn">📱 Phiên bản iPhone</a>
        </div>
    </div>

    <script>
        function detectDevice() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // Detect iOS devices
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
            
            // Detect if running as standalone PWA on iOS
            const isStandalone = ('standalone' in window.navigator) && window.navigator.standalone;
            
            // Detect mobile devices
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent);
            
            // Check screen size
            const isSmallScreen = window.innerWidth <= 768;
            
            return {
                isIOS,
                isStandalone,
                isMobile,
                isSmallScreen
            };
        }

        function redirect() {
            const device = detectDevice();
            
            // If iOS or mobile with small screen -> iOS version
            if (device.isIOS || (device.isMobile && device.isSmallScreen)) {
                console.log('Redirecting to iOS version...');
                window.location.href = 'ios.html';
            } 
            // Otherwise -> Desktop version
            else {
                console.log('Redirecting to Desktop version...');
                window.location.href = 'desktop.html';
            }
        }

        // Redirect after 500ms delay for smooth experience
        setTimeout(redirect, 500);

        // Show manual links after 3 seconds if redirect fails
        setTimeout(function() {
            document.getElementById('manualLinks').classList.add('show');
            document.querySelector('.loading-subtext').textContent = 'Hoặc chọn phiên bản thủ công:';
        }, 3000);
    </script>
</body>
</html>
